name: Build and publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the source-change diff below has a base to compare against

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build the application
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew clean test

      - name: Detect source changes
        id: changes
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "src=true" >> "$GITHUB_OUTPUT" # workflow_dispatch, or no prior commit to diff against
          else
            git diff --name-only "$BASE" "${{ github.sha }}" \
              | java -jar build/libs/pathfilter-all.jar -c .github/release-filters.yaml --stdin >> "$GITHUB_OUTPUT"
          fi

      - name: Determine project version
        if: steps.changes.outputs.src == 'true'
        id: version
        run: echo "version=$(grep '^version = ' build.gradle.kts | sed -E 's/version = "(.*)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.changes.outputs.src == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: build/libs/pathfilter-all.jar
